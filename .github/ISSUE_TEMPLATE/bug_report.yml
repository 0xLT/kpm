name: Bug report
description: Report a reproducible problem with kpm
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep examples minimal and avoid sharing private knowledge packages.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, relevant files, and expected vs actual output.
      placeholder: |
        1. npm ci
        2. node dist/cli.js ...
        3. ...
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: true
  - type: input
    id: kpm
    attributes:
      label: kpm version or commit
      placeholder: "2.0.0-alpha.1 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Package source type
      options:
        - "local file: package"
        - GitHub package
        - no package source / init-only
        - other
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
